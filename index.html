<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dammi un'altra possibilità</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Poppins:wght@400;600&display=swap');

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Arial', sans-serif;
    background: black; /* 👈 CAMBIATO QUI */
    color: white;
    overflow: hidden;
    text-align: center;
    padding: 2vh 2vw;
    box-sizing: border-box;
}

h1 {
    margin-bottom: 5vh;
    font-family: 'Baloo 2', cursive;
    font-size: 8vw;
    color: white;
    text-shadow: 2px 2px 8px rgba(200, 150, 250, 0.6);
    letter-spacing: 0.2vw;
}

.container {
    display: flex;
    flex-wrap: wrap;
    gap: 4vw;
    justify-content: center;
    align-items: center;
}

button {
    padding: 1.5vh 4vw;
    font-size: 4vw;
    border: none;
    border-radius: 1vw;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.2);
    color: white;
    font-weight: bold;
    min-width: 20vw;
}

#yes {
    background: linear-gradient(135deg, #4CAF50, #81C784);
}

#yes:hover {
    box-shadow: 0 1vh 2.5vh rgba(0,0,0,0.35);
}

#no {
    background: linear-gradient(135deg, #f44336, #e57373);
}

#no:hover {
    transform: scale(1.1);
    box-shadow: 0 1vh 2vh rgba(0,0,0,0.3);
}

canvas {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 999;
    width: 100vw;
    height: 100vh;
}

/* TESTO CENTRALE */
#message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Poppins', sans-serif;
    font-size: 2.5vw;
    max-width: 75vw;
    text-align: center;
    color: white;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    display: none;
    z-index: 1000;
}

/* TESTO IN BASSO A SINISTRA */
#footer {
    position: fixed;
    bottom: 2vh;
    left: 2vw;
    font-size: 1.2vw;
    color: white;
    opacity: 0.85;
    font-family: 'Poppins', sans-serif;
    display: none;
    z-index: 1000;
}
</style>
</head>
<body>

<h1>DAMMI UN'ALTRA POSSIBILITÀ</h1>

<div class="container">
    <button id="yes">SI</button>
    <button id="no">NO</button>
</div>

<canvas id="canvas"></canvas>

<!-- TESTO CENTRALE -->
<div id="message">
    ti ricordi la canzone come faceva?<br><br>
    "se un domani ti rompi le scatole che faccio?<br>
    trovo un modo per tornare indietro!"
</div>

<!-- TESTO IN BASSO A SINISTRA -->
<div id="footer">
    (gli albanesi senza che li republichi che non mi piacciono a maggior ragione tranquilla)
</div>

<script>
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let message = document.getElementById("message");
let footer = document.getElementById("footer");

let yesScale = 1;
let noScale = 1;
let started = false;

noBtn.addEventListener("click", () => {
    yesScale += 0.3;
    noScale -= 0.08;

    yesBtn.style.transform = `scale(${yesScale})`;

    if (noScale > 0.2) {
        noBtn.style.transform = `scale(${noScale})`;
    } else {
        noBtn.style.display = "none";
    }

    noBtn.style.position = "relative";
    noBtn.style.left = (Math.random() * 30 - 15) + "vw";
    noBtn.style.top = (Math.random() * 15 - 7.5) + "vh";
});

yesBtn.addEventListener("click", () => {
    if (started) return;
    started = true;

    canvas.style.display = "block";
    message.style.display = "block";
    footer.style.display = "block";

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    startFireworks();
    animate();
});

let particles = [];

function createExplosion(x, y) {
    for (let i = 0; i < 150; i++) {
        particles.push({
            x,
            y,
            speedX: (Math.random() - 0.5) * 15,
            speedY: (Math.random() - 0.5) * 15,
            life: 120,
            color: `hsl(${Math.random()*360},100%,50%)`
        });
    }
}

function startFireworks() {
    setInterval(() => {
        createExplosion(
            Math.random() * canvas.width,
            Math.random() * canvas.height
        );
    }, 120);
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);

        if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
